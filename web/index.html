<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield - Password Strength Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Shield Analyzer</h1>
    <p class="subtitle">Secure your digital life with advanced entropy analysis.</p>

    <div class="input-group">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
    </div>

    <div class="meter-container">
        <div class="meter">
            <div id="strength-bar"></div>
        </div>
        <span id="score">Score: 0/100</span>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Entropy</div>
            <div class="stat-value" id="entropy-value">0 bits</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Crack Time</div>
            <div class="stat-value" id="crack-value">Instant</div>
        </div>
    </div>

    <ul class="feedback-list" id="feedback">
        <!-- Feedback items will appear here -->
    </ul>
</div>

<script src="app.js"></script>

</body>
</html>
