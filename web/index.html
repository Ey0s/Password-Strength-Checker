<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield - Password Strength Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Shield Analyzer</h1>
    <p class="subtitle">Secure your digital life with advanced entropy analysis.</p>

    <div class="input-group">
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
            <button id="toggle-password" title="Show/Hide Password">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>
    </div>

    <div class="meter-container">
        <div class="meter">
            <div id="strength-bar"></div>
        </div>
        <div class="meter-meta">
            <span id="score">Score: 0/100</span>
        </div>
    </div>

    <div class="generator-section">
        <div class="generator-controls">
            <label for="length-slider">Length: <span id="length-val">16</span></label>
            <input type="range" id="length-slider" min="8" max="64" value="16">
        </div>
        <button id="generate-btn" class="secondary-btn">Generate Strong Password</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Entropy</div>
            <div class="stat-value" id="entropy-value">0 bits</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Crack Time</div>
            <div class="stat-value" id="crack-value">Instant</div>
        </div>
    </div>

    <ul class="feedback-list" id="feedback">
    </ul>
</div>

<script src="app.js"></script>

</body>
</html>
